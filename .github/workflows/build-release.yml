name: Build release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows VST3 package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build VST3
        run: cmake --build build --config Release --target AudioReactiveImagePOC_VST3

      - name: List generated Windows artifacts
        shell: pwsh
        run: Get-ChildItem -Path build\AudioReactiveImagePOC_artefacts -Recurse | Select-Object FullName

      - name: Package
        shell: pwsh
        run: .\scripts\package-windows-release.ps1

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AudioReactiveImagePOC-v1.0.0-windows
          path: dist/AudioReactiveImagePOC-v1.0.0-windows.zip
          if-no-files-found: error

  macos:
    name: macOS VST3 AU Standalone package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: bash scripts/package-macos-release.sh

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AudioReactiveImagePOC-v1.0.0-macos
          path: dist/AudioReactiveImagePOC-v1.0.0-macos.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release ZIPs
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List release ZIPs
        run: find release-artifacts -type f -name '*.zip' -print

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          zips=(release-artifacts/**/*.zip)

          if [ "${#zips[@]}" -eq 0 ]; then
            echo "No ZIP artifacts found."
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${zips[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${zips[@]}" \
              --title "AudioReactiveImagePOC ${TAG_NAME}" \
              --notes-file RELEASE_NOTES.md
          fi
